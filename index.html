<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>multisig-wallet</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"
    type="application/javascript"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script defer src="app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@1,300&display=swap');
        </style>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="">
    <div class="head">
        <div class="connectwalletdiv">
        <button type="button" class="btn btn-info" id="connect-metamask">Connect wallet</button>
        </div>
        <div class="app">
            <div id="txcheck" class="txinfo"></div>
            <hr class="line">
            <form id="submitTransaction">
            <div class="labelinput">
                <label for="address">Address</label>
                <input type="text" name="address" id="address">
                <div class="amount">
                    <label for="value" name="value">Amount</label>
                    <input type="number" min="0" step='0.05' name="value" id="valuesubmit">
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="submitTransForm">Submit</button>
            </form>
            <hr class="line">
            <div class="approve">
                <form id="approveForm">
                    <label for="txid">Transaction ID</label>
                    <input type="number" min="0" step="1" name="value" id="txidapprove">
                    <div class="approvebtn">
                        <button type="submit" class="btn btn-primary" id="approve">Approve</button>
                    </div>
                </form>
                <hr class="line">
            </div>
            <div class="revoke">
                <form id="revokeForm">
                    <label for="txid">Transaction ID</label>
                    <input type="number" min="0" step="1" name="value" id="txidrevoke">
                    <div>
                        <button type="submit" class="btn btn-danger" id="revoke">Revoke</button>
                    </div>
                </form>
                <hr class="line">
            </div>
            <div class="execute">
                <form id="executeForm">
                <label for="txid">Transaction ID</label>
                <input type="number" min="0" step="1" name="value" id="txidexecute">
                <div>
                    <button type="submit" class="btn btn-primary" id="execute">Execute</button>
                </div>
                </form>
            </div>
        <label id="txlog"></label>
        </div>
    </div>

</body>
</html>
